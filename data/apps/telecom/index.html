<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telecom - Android 测试版下载</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: backgroundMove 20s linear infinite;
            pointer-events: none;
        }

        @keyframes backgroundMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeInDown 0.6s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .app-icon {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            object-fit: cover;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        .header h1 {
            font-size: 2.8em;
            margin-bottom: 12px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.15);
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 1.15em;
            opacity: 0.95;
            font-weight: 300;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeInUp 0.6s ease-out 0.2s backwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: white;
            font-size: 1.3em;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fecaca;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            margin: 20px 0;
            font-size: 1.1em;
        }

        .version-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .info-item {
            padding: 20px;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border-radius: 12px;
            border: 1px solid rgba(0, 180, 219, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .info-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 180, 219, 0.15);
        }

        .info-label {
            font-size: 0.9em;
            color: #0369a1;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-size: 1.3em;
            font-weight: 700;
            color: #0c4a6e;
        }

        .download-button {
            display: block;
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 12px;
            font-size: 1.15em;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 25px;
            box-shadow: 0 4px 14px rgba(0, 180, 219, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .download-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 180, 219, 0.4);
        }

        .download-button:active {
            transform: translateY(-1px);
        }

        .qr-section {
            text-align: center;
            margin: 35px 0;
        }

        .qr-image {
            max-width: 220px;
            border: 3px solid #e0f2fe;
            border-radius: 12px;
            padding: 15px;
            background: white;
            box-shadow: 0 4px 12px rgba(0, 180, 219, 0.1);
            transition: transform 0.3s;
        }

        .qr-image:hover {
            transform: scale(1.05);
        }

        .changelog {
            margin-top: 25px;
        }

        .changelog h3 {
            margin-bottom: 12px;
            color: #0c4a6e;
            font-size: 1.3em;
            font-weight: 700;
        }

        .changelog-content {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            padding: 20px;
            border-radius: 12px;
            white-space: pre-wrap;
            line-height: 1.8;
            color: #0c4a6e;
            border: 1px solid rgba(0, 180, 219, 0.2);
            font-size: 1.05em;
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: white;
            text-decoration: none;
            opacity: 0.95;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-weight: 500;
        }

        .back-link:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.25);
            transform: translateX(-3px);
        }

        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            padding: 25px 20px;
            font-size: 0.95em;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 2.2em;
            }

            .version-info {
                grid-template-columns: 1fr;
            }

            .card {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div style="position: relative; width: 120px; height: 120px; margin: 0 auto 20px;">
                <img src="./icon.png?v=2" alt="Telecom" class="app-icon" id="appIcon"
                     onerror="this.style.display='none'; document.getElementById('fallbackIcon').style.display='block';">
                <div id="fallbackIcon" style="display: none; font-size: 4.5em; text-align: center; line-height: 120px;">📞</div>
            </div>
            <h1>Telecom</h1>
            <p>Android 测试版下载</p>
        </div>

        <div id="loading" class="loading">⏳ 加载中...</div>
        <div id="error" class="error" style="display: none;"></div>

        <div id="content" style="display: none;">
            <div class="card">
                <div class="version-info">
                    <div class="info-item">
                        <div class="info-label">📌 版本号</div>
                        <div class="info-value" id="versionName">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">🔢 构建号</div>
                        <div class="info-value" id="versionCode">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">🕐 发布时间</div>
                        <div class="info-value" id="publishTime" style="font-size: 1.1em;">-</div>
                    </div>
                </div>

                <a href="#" id="downloadButton" class="download-button">
                    📥 下载 APK
                </a>

                <div class="qr-section">
                    <img id="qrImage" class="qr-image" src="" alt="下载二维码">
                    <p style="margin-top: 12px; color: #0369a1; font-weight: 600;">📱 扫描二维码下载</p>
                </div>

                <div class="changelog" id="changelogSection" style="display: none;">
                    <h3>📝 更新说明</h3>
                    <div class="changelog-content" id="changelog"></div>
                </div>
            </div>

            <div style="text-align: center;">
                <a href="../" class="back-link">← 返回应用列表</a>
            </div>
        </div>

        <div class="footer">
            <p>💡 如有问题，请联系开发团队</p>
        </div>
    </div>

    <script>
        // 添加时间戳避免缓存
        function getTimestamp() {
            return '?t=' + new Date().getTime();
        }

        // 格式化时间
        function formatTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // 加载版本信息
        async function loadVersionInfo() {
            try {
                const res = await fetch('./latest.json' + getTimestamp());

                if (!res.ok) {
                    throw new Error('加载版本信息失败');
                }

                const data = await res.json();
                displayVersionInfo(data);

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = '⚠️ 加载失败，请刷新页面重试';
            }
        }

        // 显示版本信息
        function displayVersionInfo(data) {
            document.getElementById('versionName').textContent = data.versionName;
            document.getElementById('versionCode').textContent = data.versionCode;
            document.getElementById('publishTime').textContent = formatTime(data.publishTime);

            // 设置下载链接
            const downloadButton = document.getElementById('downloadButton');
            downloadButton.href = data.apkUrl;
            downloadButton.textContent = `📥 下载 ${data.fileName}`;

            // 设置二维码
            document.getElementById('qrImage').src = data.qrUrl + getTimestamp();

            // 显示更新说明
            if (data.changelog) {
                document.getElementById('changelogSection').style.display = 'block';
                document.getElementById('changelog').textContent = data.changelog;
            }
        }

        // 页面加载时执行
        window.addEventListener('DOMContentLoaded', loadVersionInfo);
    </script>
</body>
</html>
