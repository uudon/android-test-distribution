<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner - Android 测试版下载</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: backgroundMove 20s linear infinite;
            pointer-events: none;
        }

        @keyframes backgroundMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeInDown 0.6s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .app-icon {
            font-size: 4.5em;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        .header h1 {
            font-size: 2.8em;
            margin-bottom: 12px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.15);
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 1.15em;
            opacity: 0.95;
            font-weight: 300;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeInUp 0.6s ease-out 0.2s backwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: white;
            font-size: 1.3em;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fecaca;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            margin: 20px 0;
            font-size: 1.1em;
        }

        .version-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .info-item {
            padding: 20px;
            background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 100%);
            border-radius: 12px;
            border: 1px solid rgba(245, 87, 108, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .info-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(245, 87, 108, 0.15);
        }

        .info-label {
            font-size: 0.9em;
            color: #be123c;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-size: 1.3em;
            font-weight: 700;
            color: #881337;
        }

        .download-button {
            display: block;
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 12px;
            font-size: 1.15em;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 25px;
            box-shadow: 0 4px 14px rgba(245, 87, 108, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .download-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
        }

        .download-button:active {
            transform: translateY(-1px);
        }

        .qr-section {
            text-align: center;
            margin: 35px 0;
        }

        .qr-image {
            max-width: 220px;
            border: 3px solid #fce7f3;
            border-radius: 12px;
            padding: 15px;
            background: white;
            box-shadow: 0 4px 12px rgba(245, 87, 108, 0.1);
            transition: transform 0.3s;
        }

        .qr-image:hover {
            transform: scale(1.05);
        }

        .changelog {
            margin-top: 25px;
        }

        .changelog h3 {
            margin-bottom: 12px;
            color: #881337;
            font-size: 1.3em;
            font-weight: 700;
        }

        .changelog-content {
            background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 100%);
            padding: 20px;
            border-radius: 12px;
            white-space: pre-wrap;
            line-height: 1.8;
            color: #881337;
            border: 1px solid rgba(245, 87, 108, 0.2);
            font-size: 1.05em;
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: white;
            text-decoration: none;
            opacity: 0.95;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-weight: 500;
        }

        .back-link:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.25);
            transform: translateX(-3px);
        }

        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            padding: 25px 20px;
            font-size: 0.95em;
        }

        .history-section {
            animation: fadeInUp 0.6s ease-out 0.4s backwards;
        }

        .history-list {
            margin-top: 15px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.7);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 3px solid #f5576c;
            transition: all 0.2s;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 2px 8px rgba(245, 87, 108, 0.15);
        }

        .history-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .history-version {
            font-weight: 600;
            color: #881337;
            font-size: 1.05em;
        }

        .history-time {
            font-size: 0.85em;
            color: #64748b;
        }

        .history-meta {
            font-size: 0.9em;
            color: #475569;
            margin-bottom: 10px;
        }

        .history-download-btn {
            background: #f5576c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.2s;
        }

        .history-download-btn:hover {
            background: #f093fb;
        }

        .history-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .history-download-btn,
        .history-qr-btn {
            flex: 1;
            min-width: 120px;
            background: #f5576c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }

        .history-download-btn:hover {
            background: #f093fb;
        }

        .history-qr-btn {
            background: #6366f1;
        }

        .history-qr-btn:hover {
            background: #4f46e5;
        }

        .qr-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease-out;
        }

        .qr-modal-content {
            background: white;
            border-radius: 16px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.3s ease-out;
        }

        .qr-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .qr-modal-header h3 {
            margin: 0;
            font-size: 1.3em;
            color: #881337;
        }

        .qr-modal-close {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #64748b;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .qr-modal-close:hover {
            background: #f1f5f9;
        }

        .qr-modal-body {
            text-align: center;
        }

        .qr-info {
            margin-bottom: 15px;
            font-weight: 600;
            color: #be123c;
            font-size: 1.1em;
        }

        .qr-code-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
            min-height: 200px;
        }

        .qr-hint {
            color: #64748b;
            font-size: 0.9em;
            margin-top: 15px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 2.2em;
            }

            .version-info {
                grid-template-columns: 1fr;
            }

            .card {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="app-icon">🤝</div>
            <h1>Partner</h1>
            <p>Android 测试版下载</p>
        </div>

        <div id="loading" class="loading">⏳ 加载中...</div>
        <div id="error" class="error" style="display: none;"></div>

        <div id="content" style="display: none;">
            <div class="card">
                <div class="version-info">
                    <div class="info-item">
                        <div class="info-label">📌 版本号</div>
                        <div class="info-value" id="versionName">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">🔢 构建号</div>
                        <div class="info-value" id="versionCode">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">🕐 发布时间</div>
                        <div class="info-value" id="publishTime" style="font-size: 1.1em;">-</div>
                    </div>
                </div>

                <div class="info-item" id="checksumSection" style="display: none;">
                    <div class="info-label">🔐 SHA256校验和</div>
                    <div class="info-value" id="checksum" style="font-family: monospace; font-size: 0.9em; word-break: break-all;"></div>
                </div>

                <a href="#" id="downloadButton" class="download-button">
                    📥 下载 APK
                </a>

                <div class="qr-section">
                    <img id="qrImage" class="qr-image" src="" alt="下载二维码">
                    <p style="margin-top: 12px; color: #be123c; font-weight: 600;">📱 扫描二维码下载</p>
                </div>

                <div class="changelog" id="changelogSection" style="display: none;">
                    <h3>📝 更新说明</h3>
                    <div class="changelog-content" id="changelog"></div>
                </div>
            </div>

            <div class="card history-section" id="historySection" style="display: none;">
                <h3 style="margin-bottom: 20px; color: #881337; font-size: 1.3em;">📚 历史版本</h3>
                <div id="historyList" class="history-list"></div>
            </div>
        </div>

            <div style="text-align: center;">
                <a href="../" class="back-link">← 返回应用列表</a>
            </div>
        </div>

        <!-- 二维码模态框 -->
        <div id="qrModal" class="qr-modal" style="display: none;">
            <div class="qr-modal-content">
                <div class="qr-modal-header">
                    <h3 id="qrModalTitle">版本下载二维码</h3>
                    <button class="qr-modal-close" onclick="closeQrModal()">✕</button>
                </div>
                <div class="qr-modal-body">
                    <div class="qr-info" id="qrModalInfo"></div>
                    <div id="qrCodeContainer" class="qr-code-container"></div>
                    <p class="qr-hint">📱 扫描二维码即可下载此版本</p>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>💡 如有问题，请联系开发团队</p>
        </div>
    </div>

    <script>
        // 添加时间戳避免缓存
        function getTimestamp() {
            return '?t=' + new Date().getTime();
        }

        // 格式化时间
        function formatTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // 加载版本信息
        async function loadVersionInfo() {
            try {
                const res = await fetch('./latest.json' + getTimestamp());

                if (!res.ok) {
                    throw new Error('加载版本信息失败');
                }

                const data = await res.json();
                displayVersionInfo(data);

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = '⚠️ 加载失败，请刷新页面重试';
            }
        }

        // 显示版本信息
        function displayVersionInfo(data) {
            document.getElementById('versionName').textContent = data.versionName;
            document.getElementById('versionCode').textContent = data.versionCode;
            document.getElementById('publishTime').textContent = formatTime(data.publishTime);

            // 设置下载链接
            const downloadButton = document.getElementById('downloadButton');
            downloadButton.removeAttribute('href');  // 移除直接链接
            downloadButton.style.cursor = 'pointer';

            // 添加点击事件监听
            downloadButton.addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = data.apkUrl;
            });

            downloadButton.textContent = `📥 下载 ${data.fileName}`;

            // 设置二维码
            document.getElementById('qrImage').src = data.qrUrl + getTimestamp();

            // 显示更新说明
            if (data.changelog) {
                document.getElementById('changelogSection').style.display = 'block';
                document.getElementById('changelog').textContent = data.changelog;
            }

            // 显示校验和信息（如果存在）
            if (data.checksum) {
                document.getElementById('checksumSection').style.display = 'block';
                const checksumDiv = document.getElementById('checksum');
                checksumDiv.textContent = data.checksum;

                // 添加复制按钮
                const copyButton = document.createElement('button');
                copyButton.textContent = '📋 复制';
                copyButton.style.cssText = 'margin-left: 10px; padding: 4px 8px; font-size: 0.8em; border-radius: 4px; border: 1px solid #f5576c; background: #f5576c; color: white; cursor: pointer;';
                copyButton.onclick = function() {
                    navigator.clipboard.writeText(data.checksum);
                    copyButton.textContent = '✅ 已复制';
                    setTimeout(() => { copyButton.textContent = '📋 复制'; }, 2000);
                };
                checksumDiv.appendChild(copyButton);
            }

            // 加载历史版本
            const appId = window.location.pathname.split('/')[2];
            loadHistoryVersions(appId);
        }

        // 加载历史版本
        async function loadHistoryVersions(appId) {
            try {
                const res = await fetch(`/api/versions/${appId}`);
                if (res.ok) {
                    const result = await res.json();
                    if (result.success && result.data.length > 1) {
                        // 只显示历史版本（排除第一个，因为它是当前版本）
                        const historyVersions = result.data.slice(1);
                        displayHistoryVersions(historyVersions);
                    }
                }
            } catch (error) {
                console.error('获取历史版本失败:', error);
            }
        }

        // 显示历史版本列表
        function displayHistoryVersions(versions) {
            const historySection = document.getElementById('historySection');
            const historyList = document.getElementById('historyList');

            if (versions.length === 0) {
                historySection.style.display = 'none';
                return;
            }

            historyList.innerHTML = versions.map(version => `
                <div class="history-item">
                    <div class="history-item-header">
                        <div class="history-version">📦 ${version.versionName}</div>
                        <div class="history-time">${formatTime(version.publishTime)}</div>
                    </div>
                    <div class="history-meta">
                        构建号: ${version.versionCode} | 文件: ${version.fileName}
                    </div>
                    <div class="history-actions">
                        <button class="history-download-btn" onclick="downloadHistoryVersion('${version.apkUrl}')">
                            📥 下载此版本
                        </button>
                        <button class="history-qr-btn" onclick="showQrCode('${version.apkUrl}', '${version.versionName}', '${version.versionCode}')">
                            🔳 二维码
                        </button>
                    </div>
                </div>
            `).join('');

            historySection.style.display = 'block';
        }

        // 下载历史版本
        function downloadHistoryVersion(apkUrl) {
            window.location.href = apkUrl;
        }

        // 显示二维码弹窗
        function showQrCode(apkUrl, versionName, versionCode) {
            loadQrCodeLibrary(() => {
                const modal = document.getElementById('qrModal');
                const title = document.getElementById('qrModalTitle');
                const info = document.getElementById('qrModalInfo');
                const container = document.getElementById('qrCodeContainer');

                // 设置标题和信息
                title.textContent = '版本下载二维码';
                info.textContent = `${versionName} (${versionCode})`;

                // 清空并生成新二维码
                container.innerHTML = '';
                const fullUrl = window.location.origin + apkUrl.replace(/^\./, window.location.pathname.replace(/[^/]+$/, ''));

                new QRCode(container, {
                    text: fullUrl,
                    width: 200,
                    height: 200,
                    colorDark: '#000000',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.M
                });

                // 显示弹窗
                modal.style.display = 'flex';

                // 点击背景关闭
                modal.onclick = (e) => {
                    if (e.target === modal) {
                        closeQrModal();
                    }
                };
            });
        }

        // 关闭二维码弹窗
        function closeQrModal() {
            document.getElementById('qrModal').style.display = 'none';
        }

        // 动态加载 qrcode.js 库
        function loadQrCodeLibrary(callback) {
            if (window.QRCode) {
                callback();
                return;
            }

            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
            script.onload = callback;
            document.head.appendChild(script);
        }

        // 页面加载时执行
        window.addEventListener('DOMContentLoaded', loadVersionInfo);
    </script>
</body>
</html>
