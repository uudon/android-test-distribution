<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android 测试版下载</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(79, 172, 254, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
            animation: fadeInDown 0.6s ease-out;
        }

        .header h1 {
            font-size: 2.8em;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 1.15em;
            opacity: 0.95;
            font-weight: 300;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .app-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: inherit;
            display: block;
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .app-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--app-color);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .app-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .app-card:hover::before {
            transform: scaleX(1);
        }

        .app-icon {
            font-size: 3.5em;
            text-align: center;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .app-name {
            font-size: 1.6em;
            font-weight: 700;
            text-align: center;
            margin-bottom: 12px;
            color: #1a202c;
            letter-spacing: -0.3px;
        }

        .app-description {
            text-align: center;
            color: #718096;
            line-height: 1.7;
            font-size: 1.05em;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: white;
            font-size: 1.3em;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fecaca;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            margin: 20px 0;
            font-size: 1.1em;
        }

        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            padding: 30px 20px;
            font-size: 0.95em;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 2.2em;
            }

            .apps-grid {
                grid-template-columns: 1fr;
            }

            .app-card {
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 Android 测试版下载</h1>
            <p>选择应用下载最新测试版本</p>
        </div>

        <div id="loading" class="loading">⏳ 加载中...</div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="appsGrid" class="apps-grid" style="display: none;"></div>

        <div class="footer">
            <p>💡 如有问题，请联系开发团队</p>
        </div>
    </div>

    <script>
        // 添加时间戳避免缓存
        function getTimestamp() {
            return '?t=' + new Date().getTime();
        }

        // 加载应用列表
        async function loadApps() {
            try {
                const res = await fetch('./apps.json' + getTimestamp());

                if (!res.ok) {
                    throw new Error('加载应用列表失败');
                }

                const config = await res.json();
                displayApps(config.apps);

                document.getElementById('loading').style.display = 'none';
                document.getElementById('appsGrid').style.display = 'grid';
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = '⚠️ 加载失败，请刷新页面重试';
            }
        }

        // 显示应用卡片
        function displayApps(apps) {
            const appsGrid = document.getElementById('appsGrid');

            if (apps.length === 0) {
                appsGrid.innerHTML = '<p style="text-align: center; color: #cbd5e0; grid-column: 1/-1; font-size: 1.1em;">📭 暂无可用的应用</p>';
                return;
            }

            appsGrid.innerHTML = apps.map(app => `
                <a href="./${app.id}/" class="app-card" style="--app-color: ${app.color};">
                    <div class="app-icon">${app.icon}</div>
                    <div class="app-name">${app.name}</div>
                    <div class="app-description">${app.description}</div>
                </a>
            `).join('');
        }

        // 页面加载时执行
        window.addEventListener('DOMContentLoaded', loadApps);
    </script>
</body>
</html>
