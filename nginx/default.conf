server {
    listen 80;
    server_name localhost;

    # 根路径自动跳转到 /android/
    location = / {
        return 301 /android/;
    }

    # ==================== 多应用路由（新增） ====================

    # 应用专属 latest.json（多应用支持）
    location ~ ^/android/([^/]+)/latest\.json$ {
        alias /usr/share/nginx/html/android/apps/$1/latest.json;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # 应用专属 versions.json（多应用支持）
    location ~ ^/android/([^/]+)/versions\.json$ {
        alias /usr/share/nginx/html/android/apps/$1/versions.json;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # 应用专属 APK 下载（多应用支持）
    location ~ ^/android/([^/]+)/apk/([^/]+\.apk)$ {
        alias /usr/share/nginx/html/android/apps/$1/apk/$2;
        types { application/vnd.android.package-archive apk; }
        default_type application/vnd.android.package-archive;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, must-revalidate";
    }

    # 应用专属二维码图片（多应用支持）
    location ~ ^/android/([^/]+)/qr/([^/]+\.(png|jpg|jpeg))$ {
        alias /usr/share/nginx/html/android/apps/$1/qr/$2;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # 应用首页（多应用支持）
    location ~ ^/android/([^/]+)/$ {
        add_header Cache-Control "no-cache, no-store";
        try_files /apps/$1/index.html =404;
        root /usr/share/nginx/html/android;
    }

    # 应用静态资源文件（图标等）
    location ~ ^/android/([^/]+)/icon\.(png|jpg|jpeg|svg)$ {
        alias /usr/share/nginx/html/android/apps/$1/icon.$2;
        types { image/png png image/jpeg jpg image/svg+xml svg; }
        add_header Cache-Control "public, max-age=86400";
    }

    # ==================== 向后兼容（原有路径映射到默认应用 telecom） ====================

    # 原有 JSON 文件映射到默认应用
    location ~ ^/android/(latest\.json|versions\.json)$ {
        alias /usr/share/nginx/html/android/apps/telecom/$1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # 原有 APK 目录映射到默认应用
    location /android/apk/ {
        alias /usr/share/nginx/html/android/apps/telecom/apk/;
        types { application/vnd.android.package-archive apk; }
        default_type application/vnd.android.package-archive;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, must-revalidate";
    }

    # 原有二维码目录映射到默认应用
    location /android/qr/ {
        alias /usr/share/nginx/html/android/apps/telecom/qr/;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # 其他静态文件（包括 apps.json, index.html）
    location ~ ^/android/([^/]+\.(png|jpg|jpeg|json))$ {
        alias /usr/share/nginx/html/android/$1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # 主下载页面（应用选择页）
    location /android/ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /android/index.html;
    }

    # ==================== API 代理 ====================

    # 统计 API 反向代理
    location /api/ {
        proxy_pass http://android-stats-api:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS 支持
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";

        # 处理 OPTIONS 预检请求
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
